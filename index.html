<body>

<noscript>

<script type="text/babel" data-presets="react,env" data-type="module">
const { useState, useEffect, useMemo, useRef } = React;
const { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, AreaChart, Area, LineChart, Line } = Recharts;

// Lucide icon helper
const Icon = ({ name, className = "", size = 16, strokeWidth = 2 }) => {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const svg = window.lucide.createElement(window.lucide.icons[name] || window.lucide.icons.HelpCircle);
      svg.setAttribute('width', size);
      svg.setAttribute('height', size);
      svg.setAttribute('stroke-width', strokeWidth);
      svg.setAttribute('class', className);
      ref.current.appendChild(svg);
    }
  }, [name, className, size, strokeWidth]);
  return <span ref={ref} style={{ display: 'inline-flex' }} />;
};

const STORAGE_KEY = "atlantis_v3";
const SETTINGS_KEY = "atlantis_settings_v3";
const DISCLAIMER_KEY = "atlantis_disclaimer_v3";
const BACKUP_REMINDER_KEY = "atlantis_last_backup";

const STRATEGIES = {
  conservative: { id: "conservative", name: "Konservativ", description: "50% bei Break-Even, 50% bei +50%", isCustom: false, levels: [{ multiplier: 1.0, sell: 50, label: "Break-Even" }, { multiplier: 1.5, sell: 50, label: "+50% Gewinn" }] },
  balanced: { id: "balanced", name: "Ausgewogen", description: "33% / 33% / 33% bei BE / 1.5x / 2x", isCustom: false, levels: [{ multiplier: 1.0, sell: 33, label: "Break-Even" }, { multiplier: 1.5, sell: 33, label: "+50% Gewinn" }, { multiplier: 2.0, sell: 34, label: "+100% Gewinn" }] },
  moonbag: { id: "moonbag", name: "Moonbag", description: "25% bei BE, 50% bei 2x, 25% halten", isCustom: false, levels: [{ multiplier: 1.0, sell: 25, label: "Break-Even" }, { multiplier: 2.0, sell: 50, label: "+100% Gewinn" }, { multiplier: 5.0, sell: 25, label: "Moonshot" }] },
  aggressive: { id: "aggressive", name: "Aggressiv", description: "20% bei 2x, 30% bei 5x, 50% halten", isCustom: false, levels: [{ multiplier: 2.0, sell: 20, label: "+100% Gewinn" }, { multiplier: 5.0, sell: 30, label: "5x Moonshot" }, { multiplier: 10.0, sell: 50, label: "10x Lottery" }] },
  custom: { id: "custom", name: "🎯 Eigene Levels (Analyst-Calls)", description: "Eigene Preis-Targets pro Position", isCustom: true, levels: [] }
};

const CATEGORIES = [
  { id: "spot", label: "Spot / Long Hold", color: "#3B82F6" },
  { id: "trading", label: "Trading", color: "#F59E0B" },
  { id: "dca", label: "DCA / Sparplan", color: "#10B981" },
  { id: "memecoin", label: "Memecoin", color: "#EC4899" },
  { id: "ai", label: "AI / Tech", color: "#8B5CF6" },
  { id: "defi", label: "DeFi", color: "#06B6D4" },
  { id: "infra", label: "Infrastructure", color: "#F97316" },
  { id: "l1", label: "Layer 1", color: "#84CC16" },
  { id: "rwa", label: "RWA", color: "#14B8A6" },
  { id: "other", label: "Sonstiges", color: "#6B7280" }
];

const COUNTRIES = {
  ch: { id: "ch", name: "Schweiz 🇨🇭", currency: "CHF", rules: "In der Schweiz sind Crypto-Gewinne als Privatvermögen steuerfrei. Es fällt nur Vermögenssteuer auf den Bestand zum 31.12. an.", holdingPeriod: 0 },
  de: { id: "de", name: "Deutschland 🇩🇪", currency: "EUR", rules: "In Deutschland: Gewinne nach 1 Jahr Haltedauer steuerfrei. Vorher mit persönlichem Steuersatz versteuert. Freigrenze 600€/Jahr.", holdingPeriod: 365 },
  at: { id: "at", name: "Österreich 🇦🇹", currency: "EUR", rules: "In Österreich: Pauschal 27.5% KESt auf realisierte Gewinne, unabhängig von Haltedauer.", holdingPeriod: 0 },
  other: { id: "other", name: "Sonstiges 🌍", currency: "USD", rules: "Bitte konsultiere einen lokalen Steuerberater für die Regeln in deinem Land.", holdingPeriod: 0 }
};

const CHART_COLORS = ["#22D3EE","#10B981","#F59E0B","#EC4899","#8B5CF6","#3B82F6","#F97316","#84CC16","#EF4444","#14B8A6","#A855F7","#F43F5E","#FBBF24","#34D399","#60A5FA","#06B6D4"];

const fmt = (n, dec = 2) => {
  if (n === null || n === undefined || isNaN(n)) return "—";
  if (Math.abs(n) >= 1e6) return `${(n/1e6).toFixed(2)}M`;
  return n.toLocaleString("de-CH", { minimumFractionDigits: 0, maximumFractionDigits: dec });
};
const fmtPrice = (n) => {
  if (n === null || n === undefined || isNaN(n)) return "—";
  if (n >= 1) return `$${n.toLocaleString("de-CH", { maximumFractionDigits: 4 })}`;
  if (n >= 0.0001) return `$${n.toFixed(6)}`;
  return `$${n.toExponential(3)}`;
};
const fmtPct = (n) => {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return `${n >= 0 ? "+" : ""}${n.toFixed(2)}%`;
};

// Storage helpers using localStorage
const storage = {
  get: (key) => { try { const v = localStorage.getItem(key); return v ? { value: v } : null; } catch (e) { return null; } },
  set: (key, value) => { try { localStorage.setItem(key, value); return true; } catch (e) { return false; } },
  delete: (key) => { try { localStorage.removeItem(key); return true; } catch (e) { return false; } }
};

function App() {
  const [acceptedDisclaimer, setAcceptedDisclaimer] = useState(true);
  const [portfolios, setPortfolios] = useState([{ id: "default", name: "Hauptportfolio", positions: [], watchlist: [] }]);
  const [activePortfolioId, setActivePortfolioId] = useState("default");
  const [snapshots, setSnapshots] = useState([]);
  const [settings, setSettings] = useState({ defaultStrategy: "balanced", country: "ch", hideAmounts: false });

  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [showHelp, setShowHelp] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const [showCMCExport, setShowCMCExport] = useState(false);
  const [showQuickUpdate, setShowQuickUpdate] = useState(false);
  const [showSnapshots, setShowSnapshots] = useState(false);
  const [showWatchlist, setShowWatchlist] = useState(false);
  const [showTaxReport, setShowTaxReport] = useState(false);
  const [showSizing, setShowSizing] = useState(false);
  const [showShareImage, setShowShareImage] = useState(false);
  const [showPortfolioMgr, setShowPortfolioMgr] = useState(false);
  const [showSimulator, setShowSimulator] = useState(false);
  const [showBackupReminder, setShowBackupReminder] = useState(false);
  const [filter, setFilter] = useState("all");
  const [sortBy, setSortBy] = useState("value");
  const [expandedId, setExpandedId] = useState(null);

  // Load on mount
  useEffect(() => {
    const d = storage.get(DISCLAIMER_KEY);
    if (!d) setAcceptedDisclaimer(false);
    const r = storage.get(STORAGE_KEY);
    if (r && r.value) {
      try {
        const data = JSON.parse(r.value);
        if (data.portfolios) {
          setPortfolios(data.portfolios);
          setActivePortfolioId(data.activePortfolioId || (data.portfolios[0] && data.portfolios[0].id));
        }
        if (data.snapshots) setSnapshots(data.snapshots);
      } catch (e) {}
    }
    const s = storage.get(SETTINGS_KEY);
    if (s && s.value) {
      try { setSettings(prev => ({ ...prev, ...JSON.parse(s.value) })); } catch (e) {}
    }
    // Backup reminder check
    const last = storage.get(BACKUP_REMINDER_KEY);
    if (last && last.value) {
      const days = (Date.now() - parseInt(last.value)) / (1000*60*60*24);
      if (days > 7) setShowBackupReminder(true);
    }
  }, []);

  useEffect(() => {
    storage.set(STORAGE_KEY, JSON.stringify({ portfolios, activePortfolioId, snapshots }));
  }, [portfolios, activePortfolioId, snapshots]);

  useEffect(() => {
    storage.set(SETTINGS_KEY, JSON.stringify(settings));
  }, [settings]);

  const activePortfolio = portfolios.find(p => p.id === activePortfolioId) || portfolios[0];
  const positions = (activePortfolio && activePortfolio.positions) || [];

  const updateActivePortfolio = (updates) => {
    setPortfolios(prev => prev.map(p => p.id === activePortfolioId ? { ...p, ...updates } : p));
  };

  const computeAlerts = (p) => {
    const strat = STRATEGIES[p.strategy || settings.defaultStrategy];
    if (!strat || !p.avgBuy) return [];
    if (strat.isCustom) {
      const customLevels = p.customLevels || [];
      return customLevels.map(lvl => {
        const targetPrice = parseFloat(lvl.targetPrice) || 0;
        const sold = (p.soldTranches || []).find(t => t.label === lvl.label);
        const triggered = targetPrice > 0 && p.currentPrice >= targetPrice;
        const distance = targetPrice > 0 ? ((targetPrice - p.currentPrice) / p.currentPrice) * 100 : 0;
        return { ...lvl, multiplier: p.avgBuy > 0 ? targetPrice / p.avgBuy : 0, targetPrice, triggered, sold: !!sold, distance };
      });
    }
    return strat.levels.map(lvl => {
      const targetPrice = p.avgBuy * lvl.multiplier;
      const sold = (p.soldTranches || []).find(t => t.label === lvl.label || t.multiplier === lvl.multiplier);
      const triggered = p.currentPrice >= targetPrice;
      const distance = ((targetPrice - p.currentPrice) / p.currentPrice) * 100;
      return { ...lvl, targetPrice, triggered, sold: !!sold, distance };
    });
  };

  const computeRisk = (p, totalValue) => {
    let risk = 0;
    const reasons = [];
    const alloc = totalValue > 0 ? (p.value || 0) / totalValue : 0;
    if (alloc > 0.4) { risk += 3; reasons.push("Über 40% Konzentration"); }
    else if (alloc > 0.25) { risk += 2; reasons.push("Hohe Konzentration"); }
    if (p.plPct < -80) { risk += 3; reasons.push("Drawdown >80%"); }
    else if (p.plPct < -50) { risk += 2; reasons.push("Drawdown >50%"); }
    if (p.category === "memecoin") { risk += 1; reasons.push("Memecoin-Volatilität"); }
    if (p.value < 50 && p.value > 0) { risk += 1; reasons.push("Sehr kleine Position"); }
    return { score: Math.min(risk, 6), reasons, level: risk <= 2 ? "low" : risk <= 4 ? "medium" : "high" };
  };

  const metrics = useMemo(() => {
    const enriched = positions.map(p => {
      const value = (p.qty || 0) * (p.currentPrice || 0);
      const cost = (p.qty || 0) * (p.avgBuy || 0);
      const pl = value - cost;
      const plPct = cost > 0 ? (pl / cost) * 100 : 0;
      const realized = (p.soldTranches || []).reduce((s, t) => s + (t.amount || 0), 0);
      const realizedCost = (p.soldTranches || []).reduce((s, t) => s + (t.qty || 0) * (p.avgBuy || 0), 0);
      const realizedPL = realized - realizedCost;
      const alerts = computeAlerts(p);
      const triggeredAlerts = alerts.filter(a => a.triggered && !a.sold).length;
      const allSold = alerts.length > 0 && alerts.every(a => a.sold);
      return { ...p, value, cost, pl, plPct, realized, realizedPL, alerts, triggeredAlerts, allSold };
    });
    const totalValue = enriched.reduce((s, p) => s + p.value, 0);
    const enrichedWithRisk = enriched.map(p => ({ ...p, risk: computeRisk(p, totalValue) }));
    const totalCost = enrichedWithRisk.reduce((s, p) => s + p.cost, 0);
    const totalRealized = enrichedWithRisk.reduce((s, p) => s + p.realized, 0);
    const totalRealizedPL = enrichedWithRisk.reduce((s, p) => s + p.realizedPL, 0);
    const totalUnrealized = totalValue - totalCost;
    const totalPL = totalUnrealized + totalRealizedPL;
    const totalPLPct = totalCost > 0 ? (totalPL / totalCost) * 100 : 0;
    const profitable = enrichedWithRisk.filter(p => p.pl > 0).length;
    const losing = enrichedWithRisk.filter(p => p.pl < 0).length;
    const totalTriggered = enrichedWithRisk.reduce((s, p) => s + p.triggeredAlerts, 0);
    const best = enrichedWithRisk.reduce((b, p) => !b || p.plPct > b.plPct ? p : b, null);
    const worst = enrichedWithRisk.reduce((w, p) => !w || p.plPct < w.plPct ? p : w, null);
    return { enriched: enrichedWithRisk, totalValue, totalCost, totalRealized, totalRealizedPL, totalUnrealized, totalPL, totalPLPct, profitable, losing, best, worst, totalTriggered };
  }, [positions, settings]);

  const filteredEnriched = useMemo(() => {
    let arr = metrics.enriched;
    if (filter !== "all") arr = arr.filter(p => p.category === filter);
    arr = [...arr];
    if (sortBy === "value") arr.sort((a, b) => b.value - a.value);
    else if (sortBy === "pl") arr.sort((a, b) => b.pl - a.pl);
    else if (sortBy === "plPct") arr.sort((a, b) => b.plPct - a.plPct);
    else if (sortBy === "alerts") arr.sort((a, b) => b.triggeredAlerts - a.triggeredAlerts);
    else if (sortBy === "risk") arr.sort((a, b) => b.risk.score - a.risk.score);
    else if (sortBy === "name") arr.sort((a, b) => (a.symbol || "").localeCompare(b.symbol || ""));
    return arr;
  }, [metrics.enriched, filter, sortBy]);

  const allocationData = useMemo(() => metrics.enriched.filter(p => p.value > 0).map((p, i) => ({ name: p.symbol, value: p.value, color: CHART_COLORS[i % CHART_COLORS.length] })).sort((a, b) => b.value - a.value), [metrics.enriched]);

  const categoryAllocation = useMemo(() => {
    const map = {};
    metrics.enriched.forEach(p => {
      const cat = CATEGORIES.find(c => c.id === p.category) || CATEGORIES[CATEGORIES.length - 1];
      if (!map[cat.id]) map[cat.id] = { name: cat.label, value: 0, color: cat.color };
      map[cat.id].value += p.value;
    });
    return Object.values(map).filter(c => c.value > 0).sort((a, b) => b.value - a.value);
  }, [metrics.enriched]);

  const plChartData = useMemo(() => [...metrics.enriched].filter(p => p.cost > 0).sort((a, b) => a.pl - b.pl).map(p => ({ name: p.symbol, pl: Math.round(p.pl), fill: p.pl >= 0 ? "#10B981" : "#EF4444" })), [metrics.enriched]);

  const portfolioSnapshots = snapshots.filter(s => s.portfolioId === activePortfolioId).sort((a, b) => new Date(a.date) - new Date(b.date));

  // Handlers
  const handleSubmit = (data) => {
    if (editingId) {
      updateActivePortfolio({ positions: positions.map(p => p.id === editingId ? { ...p, ...data } : p) });
      setEditingId(null);
    } else {
      updateActivePortfolio({ positions: [...positions, { id: Date.now().toString(), strategy: settings.defaultStrategy, soldTranches: [], ...data }] });
    }
    setShowForm(false);
  };

  const handleDelete = (id) => updateActivePortfolio({ positions: positions.filter(p => p.id !== id) });

  const handleSellTranche = (positionId, alert) => {
    const p = positions.find(x => x.id === positionId);
    if (!p) return;
    const sellQty = (p.qty * alert.sell) / 100;
    const amount = sellQty * p.currentPrice;
    const newSold = [...(p.soldTranches || []), { label: alert.label, multiplier: alert.multiplier, qty: sellQty, price: p.currentPrice, amount, date: new Date().toISOString().split("T")[0], avgBuy: p.avgBuy, symbol: p.symbol }];
    updateActivePortfolio({ positions: positions.map(x => x.id === positionId ? { ...x, qty: x.qty - sellQty, soldTranches: newSold } : x) });
  };

  const handleQuickUpdatePrices = (updates) => {
    updateActivePortfolio({ positions: positions.map(p => updates[p.id] !== undefined && updates[p.id] !== "" ? { ...p, currentPrice: parseFloat(updates[p.id]) } : p) });
    setShowQuickUpdate(false);
  };

  const handleSnapshot = () => {
    const snap = { id: Date.now().toString(), portfolioId: activePortfolioId, date: new Date().toISOString(), totalValue: metrics.totalValue, totalCost: metrics.totalCost, totalPL: metrics.totalPL, totalPLPct: metrics.totalPLPct, positionCount: positions.length };
    setSnapshots(prev => [...prev, snap]);
  };

  const handleResetAll = () => {
    setPortfolios([{ id: "default", name: "Hauptportfolio", positions: [], watchlist: [] }]);
    setActivePortfolioId("default");
    setSnapshots([]);
    storage.delete(STORAGE_KEY);
    setShowResetConfirm(false);
  };

  const handleExport = () => {
    const data = JSON.stringify({ portfolios, activePortfolioId, snapshots, settings, version: "v3", exportDate: new Date().toISOString() }, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `atlantis_backup_${new Date().toISOString().split("T")[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
    storage.set(BACKUP_REMINDER_KEY, Date.now().toString());
    setShowBackupReminder(false);
  };

  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = JSON.parse(evt.target.result);
        if (data.portfolios) {
          setPortfolios(data.portfolios);
          setActivePortfolioId(data.activePortfolioId || (data.portfolios[0] && data.portfolios[0].id));
          if (data.snapshots) setSnapshots(data.snapshots);
        } else if (Array.isArray(data)) {
          setPortfolios([{ id: "default", name: "Imported", positions: data, watchlist: [] }]);
        }
        alert("Backup erfolgreich wiederhergestellt!");
      } catch (err) { alert("Datei konnte nicht gelesen werden."); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const generateCMCAlertsText = () => {
    let text = "═══ ATLANTIS TERMINAL — CoinMarketCap Alert-Liste ═══\n\n";
    text += `Erstellt: ${new Date().toLocaleDateString("de-CH")}\nPortfolio: ${activePortfolio.name}\nAnzahl Positionen: ${positions.length}\n\n`;
    text += "─".repeat(60) + "\n\n";
    metrics.enriched.forEach(p => {
      text += `${p.symbol}\n  Avg. Buy: ${fmtPrice(p.avgBuy)}\n  Aktuell:  ${fmtPrice(p.currentPrice)}\n`;
      p.alerts.forEach(a => {
        const status = a.sold ? "✓ verkauft" : a.triggered ? "🔔 ausgelöst" : "⏳ wartend";
        text += `  ▸ ${a.label.padEnd(20)} → ${fmtPrice(a.targetPrice).padEnd(14)} (${a.sell}%) ${status}\n`;
      });
      text += "\n";
    });
    text += "─".repeat(60) + "\nGeneriert mit Atlantis Terminal\n";
    return text;
  };

  const generateTaxExcel = () => {
    const country = COUNTRIES[settings.country] || COUNTRIES.other;
    const wb = XLSX.utils.book_new();

    const coverData = [
      ["ATLANTIS TERMINAL — STEUER-REPORT"],
      [""],
      ["Erstellt am:", new Date().toLocaleDateString("de-CH")],
      ["Portfolio:", activePortfolio.name],
      ["Land:", country.name],
      ["Währung:", country.currency],
      [""],
      ["WICHTIGER HINWEIS:"],
      [country.rules],
      [""],
      ["Dieses Dokument ist eine Datenaufstellung — KEINE Steuerberatung."],
      ["Bitte für die Steuererklärung einen qualifizierten Steuerberater beiziehen."]
    ];
    const wsCover = XLSX.utils.aoa_to_sheet(coverData);
    wsCover["!cols"] = [{ wch: 30 }, { wch: 60 }];
    XLSX.utils.book_append_sheet(wb, wsCover, "Übersicht");

    const realizedRows = [["Datum", "Coin", "Menge verkauft", "Verkaufspreis", "Verkaufswert", "Kaufpreis (avg)", "Kaufwert", "Gewinn/Verlust", "Haltedauer (Tage)", "Steuerstatus"]];
    positions.forEach(p => {
      (p.soldTranches || []).forEach(t => {
        const buyValue = t.qty * (t.avgBuy || p.avgBuy);
        const profit = t.amount - buyValue;
        const purchaseDate = p.purchaseDate ? new Date(p.purchaseDate) : null;
        const sellDate = new Date(t.date);
        const holdingDays = purchaseDate ? Math.floor((sellDate - purchaseDate) / (1000 * 60 * 60 * 24)) : null;
        let taxStatus = "";
        if (settings.country === "ch") taxStatus = "Steuerfrei (Privatvermögen)";
        else if (settings.country === "de") taxStatus = holdingDays >= 365 ? "Steuerfrei (>1 Jahr)" : "Steuerpflichtig";
        else if (settings.country === "at") taxStatus = "27.5% KESt";
        else taxStatus = "Bitte mit Berater klären";
        realizedRows.push([t.date, t.symbol || p.symbol, t.qty, t.price, t.amount, t.avgBuy || p.avgBuy, buyValue, profit, holdingDays, taxStatus]);
      });
    });
    if (realizedRows.length === 1) realizedRows.push(["—", "Keine realisierten Verkäufe", "", "", "", "", "", "", "", ""]);
    const wsRealized = XLSX.utils.aoa_to_sheet(realizedRows);
    wsRealized["!cols"] = [{ wch: 12 }, { wch: 10 }, { wch: 14 }, { wch: 12 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 25 }];
    XLSX.utils.book_append_sheet(wb, wsRealized, "Realisierte Gewinne");

    const holdingsRows = [["Coin", "Menge", "Avg. Einkauf", "Aktueller Preis", "Aktueller Wert", "Cost Basis", "Buchgewinn/-verlust", "P/L %", "Kaufdatum", "Haltedauer (Tage)"]];
    positions.forEach(p => {
      const value = p.qty * p.currentPrice;
      const cost = p.qty * p.avgBuy;
      const pl = value - cost;
      const plPct = cost > 0 ? (pl / cost) * 100 : 0;
      const purchaseDate = p.purchaseDate ? new Date(p.purchaseDate) : null;
      const today = new Date();
      const holdingDays = purchaseDate ? Math.floor((today - purchaseDate) / (1000 * 60 * 60 * 24)) : null;
      holdingsRows.push([p.symbol, p.qty, p.avgBuy, p.currentPrice, value, cost, pl, plPct.toFixed(2) + "%", p.purchaseDate || "—", holdingDays]);
    });
    const wsHoldings = XLSX.utils.aoa_to_sheet(holdingsRows);
    wsHoldings["!cols"] = [{ wch: 10 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 10 }, { wch: 12 }, { wch: 14 }];
    XLSX.utils.book_append_sheet(wb, wsHoldings, "Aktuelle Bestände");

    if (settings.country === "ch") {
      const yearEndRows = [["VERMÖGENSAUSWEIS — Crypto Holdings"], [""], ["Stand:", new Date().toLocaleDateString("de-CH")], [""], ["Coin", "Menge", "Aktueller Preis (USD)", "Wert (USD)"]];
      let total = 0;
      positions.forEach(p => {
        const value = p.qty * p.currentPrice;
        total += value;
        yearEndRows.push([p.symbol, p.qty, p.currentPrice, value]);
      });
      yearEndRows.push([""], ["TOTAL VERMÖGEN", "", "", total]);
      yearEndRows.push([""], ["Hinweis: Für Schweizer Steuererklärung — Stichtagswert für Vermögenssteuer."]);
      const wsYearEnd = XLSX.utils.aoa_to_sheet(yearEndRows);
      wsYearEnd["!cols"] = [{ wch: 25 }, { wch: 16 }, { wch: 18 }, { wch: 16 }];
      XLSX.utils.book_append_sheet(wb, wsYearEnd, "Vermögensausweis CH");
    }

    XLSX.writeFile(wb, `atlantis_steuerreport_${new Date().toISOString().split("T")[0]}.xlsx`);
    setShowTaxReport(false);
  };

  const editingPosition = editingId ? positions.find(p => p.id === editingId) : null;

  if (!acceptedDisclaimer) {
    return <DisclaimerScreen onAccept={() => { storage.set(DISCLAIMER_KEY, "accepted"); setAcceptedDisclaimer(true); }} />;

  return (

        <div className="max-w-7xl mx-auto px-3 sm:px-6 py-3 sm:py-4 flex items-center justify-between gap-2">

              <Icon name="anchor" size={20} className="text-slate-950" strokeWidth={2.5} />
            </div>

    </div>

}

            <p>Atlantis Terminal ist ein <strong>persönliches Tracking-Tool</strong>. Es stellt keine Anlageberatung, Empfehlung oder Aufforderung zum Kauf/Verkauf von Finanzinstrumenten dar. Crypto-Investments sind hochspekulativ und können zum Totalverlust führen.</p>
          </div>
          <div className="border-l-4 border-blue-500 pl-4 bg-blue-950/20 py-3 pr-3 rounded-r">
            <h3 className="font-bold text-blue-200 mb-1">2. Keine Steuerberatung</h3>
            <p>Die Steuer-Funktionen sind <strong>reine Hilfsmittel zur Datenaufstellung</strong>. Sie ersetzen keine professionelle Steuerberatung. Steuerregeln sind länderspezifisch — bitte konsultiere einen Steuerberater.</p>
          </div>
          <div className="border-l-4 border-emerald-500 pl-4 bg-emerald-950/20 py-3 pr-3 rounded-r">
            <h3 className="font-bold text-emerald-200 mb-1">3. Eigenverantwortung</h3>
            <p>Alle Entscheidungen triffst du <strong>eigenverantwortlich</strong>. Atlantis Terminal übernimmt keine Haftung für finanzielle Verluste oder steuerliche Konsequenzen.</p>
          </div>
        </div>
        <div className="space-y-2 mb-6">
          <label className="flex items-start gap-2 cursor-pointer text-sm"><input type="checkbox" checked={a1} onChange={(e) => setA1(e.target.checked)} className="mt-1 accent-cyan-500" /><span className="text-slate-300">Ich verstehe, dass dieses Tool <strong>keine Anlageberatung</strong> ist.</span></label>
          <label className="flex items-start gap-2 cursor-pointer text-sm"><input type="checkbox" checked={a2} onChange={(e) => setA2(e.target.checked)} className="mt-1 accent-cyan-500" /><span className="text-slate-300">Ich verstehe, dass dieses Tool <strong>keine Steuerberatung</strong> ersetzt.</span></label>
          <label className="flex items-start gap-2 cursor-pointer text-sm"><input type="checkbox" checked={a3} onChange={(e) => setA3(e.target.checked)} className="mt-1 accent-cyan-500" /><span className="text-slate-300">Ich nutze das Tool <strong>auf eigene Verantwortung</strong>.</span></label>

  return (
    <div className="border border-cyan-900/40 rounded-lg p-3 sm:p-4 bg-gradient-to-br from-slate-900/60 to-cyan-950/20 backdrop-blur">

function ChartCard({ title, sub, children }) {

function Highlight({ icon, label, position, variant }) {

        <Icon name={icon} size={16} className={isGreen ? "text-emerald-400" : "text-red-400"} />

function PositionCard({ position, totalValue, expanded, onToggle, onEdit, onDelete, onSellTranche, hideAmounts }) {
  const cat = CATEGORIES.find(c => c.id === position.category) || CATEGORIES[CATEGORIES.length-1];
  const alloc = totalValue > 0 ? position.value / totalValue * 100 : 0;
  const strat = STRATEGIES[position.strategy || "balanced"];
  const nextAlert = position.alerts.find(a => !a.triggered && !a.sold);
  const triggeredCount = position.alerts.filter(a => a.triggered && !a.sold).length;
  const riskColor = position.risk.level === "high" ? "text-red-400 bg-red-500/10 border-red-700" : position.risk.level === "medium" ? "text-amber-400 bg-amber-500/10 border-amber-700" : "text-emerald-400 bg-emerald-500/10 border-emerald-700";

  return (
    <div className={`border rounded-lg overflow-hidden transition-all ${triggeredCount > 0 ? "border-amber-700 bg-amber-950/10" : position.allSold ? "border-emerald-900 bg-emerald-950/10" : "border-cyan-900/40 bg-slate-900/30"}`}>
      <div onClick={onToggle} className="p-3 cursor-pointer hover:bg-cyan-950/20 transition-colors">
        <div className="flex items-center gap-2 sm:gap-3">
          <button className="text-cyan-700 hover:text-cyan-400 flex-shrink-0">{expanded ? <Icon name="chevron-down" size={16} /> : <Icon name="chevron-right" size={16} />}</button>
          <div className="flex-shrink-0">
            <div className="flex items-center gap-1.5 sm:gap-2">
              <div className="font-bold text-base sm:text-lg font-display">{position.symbol}</div>
              {triggeredCount > 0 && <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded bg-amber-500/20 text-amber-400 text-[10px] font-bold alert-pulse"><Icon name="bell" size={10} /> {triggeredCount}</span>}
              {position.allSold && <span className="inline-flex items-center gap-1 px-1.5 py-0.5 rounded bg-emerald-500/20 text-emerald-400 text-[10px] font-bold"><Icon name="check" size={10} /></span>}
              <span className={`hidden sm:inline-block px-1.5 py-0.5 rounded text-[9px] font-bold border ${riskColor}`}>RISK {position.risk.score}/6</span>
            </div>
            <span className="inline-block mt-1 px-1.5 py-0.5 rounded text-[9px] sm:text-[10px] font-bold" style={{ background: cat.color + "22", color: cat.color }}>{cat.label}</span>
          </div>
          <div className="flex-1 min-w-0 hidden sm:block">
            <div className="text-xs text-slate-400">Aktuell</div>
            <div className="font-bold tabular-nums text-sm">{fmtPrice(position.currentPrice)}</div>
          </div>
          <div className="flex-1 min-w-0 text-right sm:text-left">
            <div className="text-[10px] sm:text-xs text-slate-400">Wert</div>
            <div className="font-bold tabular-nums text-sm">{hideAmounts ? "$•••" : `$${fmt(position.value, 0)}`}</div>
            <div className="text-[10px] text-cyan-700">{alloc.toFixed(1)}%</div>
          </div>
          <div className="flex-1 min-w-0 text-right">
            <div className="text-[10px] sm:text-xs text-slate-400">P/L</div>
            <div className={`font-bold tabular-nums text-sm ${position.pl >= 0 ? "text-emerald-400" : "text-red-400"}`}>{fmtPct(position.plPct)}</div>
            <div className="text-[10px] text-slate-500">{hideAmounts ? "•••" : `${position.pl >= 0 ? "+" : "-"}$${fmt(Math.abs(position.pl), 0)}`}</div>
          </div>
          <div className="hidden sm:flex gap-1 flex-shrink-0">
            <button onClick={(e) => { e.stopPropagation(); onEdit(); }} className="p-1.5 hover:bg-cyan-950/40 rounded text-cyan-400"><Icon name="edit-2" size={14} /></button>
            <button onClick={(e) => { e.stopPropagation(); onDelete(); }} className="p-1.5 hover:bg-red-950/40 rounded text-red-400"><Icon name="trash-2" size={14} /></button>
          </div>
        </div>
        {nextAlert && !position.allSold && (
          <div className="mt-2 ml-7">
            <div className="flex items-center justify-between text-[10px] mb-1">
              <span className="text-cyan-700 truncate">Nächstes Ziel: {nextAlert.label}</span>
              <span className={`font-bold tabular-nums ${nextAlert.distance < 10 ? "text-amber-400" : "text-cyan-700"}`}>{fmtPrice(nextAlert.targetPrice)} {nextAlert.distance > 0 ? `(+${nextAlert.distance.toFixed(0)}%)` : "🔔"}</span>
            </div>
            <div className="h-1 bg-slate-800 rounded overflow-hidden">
              <div className={`h-full transition-all ${nextAlert.distance < 10 ? "bg-amber-500" : "bg-cyan-500"}`} style={{ width: `${Math.max(0, Math.min(100, 100 - nextAlert.distance))}%` }} />
            </div>
          </div>
        )}
      </div>
      {expanded && (
        <div className="border-t border-cyan-900/40 p-3 sm:p-4 bg-slate-950/40 space-y-4">
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 sm:gap-3">
            <Stat label="Menge" value={fmt(position.qty, 4)} />
            <Stat label="Avg. Buy" value={fmtPrice(position.avgBuy)} />
            <Stat label="Cost Basis" value={hideAmounts ? "$•••" : `$${fmt(position.cost, 0)}`} />
            <Stat label="Realisiert" value={hideAmounts ? "$•••" : `$${fmt(position.realized, 0)}`} color={position.realized > 0 ? "green" : "default"} />
          </div>
          {position.risk.reasons.length > 0 && (
            <div className={`text-xs px-3 py-2 rounded border ${riskColor}`}>
              <div className="font-bold mb-1">⚠️ Risk Score {position.risk.score}/6:</div>
              <div>{position.risk.reasons.join(" · ")}</div>
            </div>
          )}
          <div>
            <h4 className="text-[10px] font-bold tracking-widest text-cyan-400 flex items-center gap-1.5 mb-2"><Icon name="target" size={12} /> TAKE-PROFIT-PLAN: {strat.name.toUpperCase()}</h4>
            <div className="space-y-2">
              {position.alerts.map((alert, i) => (
                <div key={i} className={`border rounded p-2 sm:p-3 flex items-center gap-2 sm:gap-3 ${alert.sold ? "border-emerald-900 bg-emerald-950/20" : alert.triggered ? "border-amber-700 bg-amber-950/20 alert-pulse" : "border-slate-800 bg-slate-900/40"}`}>
                  <div className="flex-shrink-0">{alert.sold ? <Icon name="check" size={16} className="text-emerald-400" /> : alert.triggered ? <Icon name="bell" size={16} className="text-amber-400" /> : <Icon name="target" size={16} className="text-cyan-700" />}</div>
                  <div className="flex-1 min-w-0">
                    <div className="text-xs sm:text-sm font-bold text-cyan-100 truncate">{alert.label}</div>
                    <div className="text-[10px] sm:text-xs text-slate-400">{alert.sell}% bei {fmtPrice(alert.targetPrice)}</div>
                  </div>
                  <div className="text-right flex-shrink-0">
                    {alert.sold ? <span className="text-[10px] text-emerald-400 font-bold">VERKAUFT</span> : alert.triggered ? <button onClick={() => onSellTranche(alert)} className="text-[10px] sm:text-xs px-2 sm:px-3 py-1 sm:py-1.5 bg-amber-500 hover:bg-amber-400 text-slate-950 rounded font-bold whitespace-nowrap">VERKAUFT ✓</button> : <span className={`text-[10px] tabular-nums ${alert.distance < 10 ? "text-amber-400" : "text-cyan-700"}`}>{alert.distance > 0 ? `+${alert.distance.toFixed(1)}%` : "🔔"}</span>}
                  </div>
                </div>
              ))}
            </div>
          </div>
          {position.soldTranches && position.soldTranches.length > 0 && (
            <div>
              <h4 className="text-[10px] font-bold tracking-widest text-emerald-400 mb-2">VERKAUFS-HISTORIE</h4>
              <div className="space-y-1">
                {position.soldTranches.map((s, i) => (
                  <div key={i} className="text-[10px] sm:text-xs flex items-center gap-2 px-2 py-1.5 bg-emerald-950/20 border border-emerald-900/40 rounded">
                    <Icon name="check" size={12} className="text-emerald-400 flex-shrink-0" />
                    <span className="text-emerald-200 flex-1 truncate">{s.date} · {s.label}</span>
                    <span className="text-slate-400 tabular-nums">{fmt(s.qty, 4)} @ {fmtPrice(s.price)}</span>
                    <span className="text-emerald-400 font-bold tabular-nums">${fmt(s.amount, 0)}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {position.notes && <div className="text-xs text-slate-400 italic border-t border-slate-800 pt-3">📝 {position.notes}</div>}
          <div className="flex sm:hidden gap-2 pt-2 border-t border-slate-800">
            <button onClick={onEdit} className="flex-1 py-2 text-xs border border-cyan-900 hover:bg-cyan-950/40 rounded text-cyan-300 flex items-center justify-center gap-1"><Icon name="edit-2" size={12} /> Bearbeiten</button>
            <button onClick={onDelete} className="flex-1 py-2 text-xs border border-red-900 hover:bg-red-950/40 rounded text-red-400 flex items-center justify-center gap-1"><Icon name="trash-2" size={12} /> Löschen</button>
          </div>
        </div>
      )}
    </div>
  );
}

function Stat({ label, value, color }) {
  const c = color === "green" ? "text-emerald-400" : color === "red" ? "text-red-400" : "text-cyan-100";
  return (<div><div className="text-[9px] sm:text-[10px] uppercase tracking-wider text-cyan-700">{label}</div><div className={`tabular-nums text-xs sm:text-sm font-bold ${c}`}>{value}</div></div>);
}

function Modal({ children, onClose, size = "default" }) {
  const sizeClass = size === "large" ? "max-w-4xl" : "max-w-2xl";
  return (
    <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-50 flex items-center justify-center p-4 overflow-y-auto" onClick={onClose}>
      <div className={`bg-gradient-to-br from-slate-900 to-slate-950 border border-cyan-900 rounded-lg p-5 sm:p-6 w-full ${sizeClass} my-8 max-h-[90vh] overflow-y-auto`} onClick={(e) => e.stopPropagation()}>{children}</div>
    </div>
  );
}

function PositionForm({ position, onSubmit, onCancel, defaultStrategy }) {
  const [form, setForm] = useState(position || { symbol: "", qty: "", avgBuy: "", currentPrice: "", category: "spot", strategy: defaultStrategy, purchaseDate: "", notes: "", customLevels: [] });
  const [errors, setErrors] = useState({});
  const isCustom = (STRATEGIES[form.strategy] && STRATEGIES[form.strategy].isCustom);

  const handleSubmit = () => {
    const errs = {};
    if (!form.symbol || !form.symbol.trim()) errs.symbol = "Symbol erforderlich";
    if (!form.qty || isNaN(parseFloat(form.qty)) || parseFloat(form.qty) <= 0) errs.qty = "Menge > 0";
    if (form.avgBuy === "" || isNaN(parseFloat(form.avgBuy)) || parseFloat(form.avgBuy) < 0) errs.avgBuy = "Preis erforderlich";
    if (form.currentPrice === "" || isNaN(parseFloat(form.currentPrice)) || parseFloat(form.currentPrice) < 0) errs.currentPrice = "Preis erforderlich";
    if (isCustom) {
      if (!form.customLevels || form.customLevels.length === 0) {
        errs.customLevels = "Mindestens ein Level erforderlich";
      } else {
        const totalPct = form.customLevels.reduce((s, l) => s + (parseFloat(l.sell) || 0), 0);
        if (totalPct > 100) errs.customLevels = "Verkaufs-% darf nicht über 100% liegen";
        for (let i = 0; i < form.customLevels.length; i++) {
          const lvl = form.customLevels[i];
          if (!lvl.label || !lvl.label.trim()) { errs.customLevels = `Level ${i+1}: Bezeichnung fehlt`; break; }
          if (!lvl.targetPrice || isNaN(parseFloat(lvl.targetPrice)) || parseFloat(lvl.targetPrice) <= 0) { errs.customLevels = `Level ${i+1}: Ungültiger Ziel-Preis`; break; }
          if (!lvl.sell || isNaN(parseFloat(lvl.sell)) || parseFloat(lvl.sell) <= 0 || parseFloat(lvl.sell) > 100) { errs.customLevels = `Level ${i+1}: Verkaufs-% zwischen 1 und 100`; break; }
        }
      }
    }
    if (Object.keys(errs).length > 0) { setErrors(errs); return; }
    onSubmit({
      symbol: form.symbol.trim().toUpperCase(),
      qty: parseFloat(form.qty),
      avgBuy: parseFloat(form.avgBuy),
      currentPrice: parseFloat(form.currentPrice),
      category: form.category,
      strategy: form.strategy,
      purchaseDate: form.purchaseDate,
      notes: form.notes ? form.notes.trim() : "",
      customLevels: isCustom ? form.customLevels.map(l => ({ label: l.label.trim(), targetPrice: parseFloat(l.targetPrice), sell: parseFloat(l.sell) })) : []
    });
  };
  const update = (k, v) => { setForm(prev => ({ ...prev, [k]: v })); if (errors[k]) setErrors(prev => ({ ...prev, [k]: null })); };
  const addLevel = () => update("customLevels", [...(form.customLevels || []), { label: "", targetPrice: "", sell: "" }]);
  const updateLevel = (idx, field, value) => {
    const newLevels = [...form.customLevels];
    newLevels[idx] = { ...newLevels[idx], [field]: value };
    update("customLevels", newLevels);
  };
  const removeLevel = (idx) => update("customLevels", form.customLevels.filter((_, i) => i !== idx));

  return (
    <Modal onClose={onCancel}>
      <div className="flex items-center justify-between mb-4">
        <h3 className="text-lg sm:text-xl font-bold font-display">{position ? "Position bearbeiten" : "Neue Position"}</h3>
        <button onClick={onCancel} className="p-1 hover:bg-cyan-950/40 rounded text-cyan-400"><Icon name="x" size={16} /></button>
      </div>
      <div className="space-y-3">
        <Field label="Coin Symbol *" error={errors.symbol}><input type="text" value={form.symbol} onChange={(e) => update("symbol", e.target.value)} placeholder="z.B. BTC, TAO, KAS" className="w-full px-3 py-2 bg-slate-950 border border-cyan-900 rounded text-sm focus:outline-none focus:border-cyan-500" autoFocus /></Field>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Menge *" error={errors.qty}><input type="number" step="any" value={form.qty} onChange={(e) => update("qty", e.target.value)} placeholder="0.00" className="w-full px-3 py-2 bg-slate-950 border border-cyan-900 rounded text-sm tabular-nums focus:outline-none focus:border-cyan-500" /></Field>
          <Field label="Avg. Buy USD *" error={errors.avgBuy}><input type="number" step="any" value={form.avgBuy} onChange={(e) => update("avgBuy", e.target.value)} placeholder="0.00" className="w-full px-3 py-2 bg-slate-950 border border-cyan-900 rounded text-sm tabular-nums focus:outline-none focus:border-cyan-500" /></Field>
        </div>
        <Field label="Aktueller Preis USD *" error={errors.currentPrice}><input type="number" step="any" value={form.currentPrice} onChange={(e) => update("currentPrice", e.target.value)} placeholder="0.00" className="w-full px-3 py-2 bg-slate-950 border border-cyan-900 rounded text-sm tabular-nums focus:outline-none focus:border-cyan-500" /><p className="text-[10px] text-cyan-700 mt-1">💡 Hol den Preis von CoinMarketCap oder Binance</p></Field>
        <Field label="Kategorie"><select value={form.category} onChange={(e) => update("category", e.target.value)} className="w-full px-3 py-2 bg-slate-950 border border-cyan-900 rounded text-sm focus:outline-none focus:border-cyan-500">{CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}</select></Field>
        <Field label="Take-Profit-Strategie"><select value={form.strategy} onChange={(e) => update("strategy", e.target.value)} className="w-full px-3 py-2 bg-slate-950 border border-cyan-900 rounded text-sm focus:outline-none focus:border-cyan-500">{Object.values(STRATEGIES).map(s => <option key={s.id} value={s.id}>{s.name}{!s.isCustom && ` — ${s.description}`}</option>)}</select></Field>

        {isCustom && (
          <div className="border border-cyan-700 bg-cyan-950/20 rounded p-3 space-y-2">
            <div className="flex items-center justify-between">
              <div>
                <h4 className="text-xs font-bold text-cyan-300 flex items-center gap-1.5"><Icon name="target" size={12} /> EIGENE PREIS-TARGETS</h4>
                <p className="text-[10px] text-cyan-700 mt-0.5">Trag die Ausstiegs-Levels deiner Analysten ein</p>
              </div>
              <button onClick={addLevel} className="px-2 py-1 text-xs font-bold bg-cyan-500 hover:bg-cyan-400 text-slate-950 rounded flex items-center gap-1"><Icon name="plus" size={12} /> Level</button>
            </div>
            {(!form.customLevels || form.customLevels.length === 0) && (
              <div className="text-center py-4 text-xs text-cyan-700"><Icon name="target" size={24} className="mx-auto mb-2 opacity-40" />Noch keine Levels. Klicke "+ Level" um zu starten.</div>
            )}
            {form.customLevels && form.customLevels.map((lvl, idx) => (
              <div key={idx} className="border border-cyan-900/60 bg-slate-950/60 rounded p-2 space-y-2">
                <div className="flex items-center justify-between">
                  <span className="text-[10px] font-bold text-cyan-400">LEVEL {idx + 1}</span>
                  <button onClick={() => removeLevel(idx)} className="p-1 hover:bg-red-950/40 rounded text-red-400"><Icon name="trash-2" size={12} /></button>
                </div>

function PositionSizingModal({ totalValue, onClose }) {
  const [available, setAvailable] = useState("");
  const [riskPct, setRiskPct] = useState("5");
  const [coin, setCoin] = useState("");
  const [coinPrice, setCoinPrice] = useState("");
  const avail = parseFloat(available) || 0;
  const risk = parseFloat(riskPct) || 0;
  const price = parseFloat(coinPrice) || 0;
  const targetSize = (avail * risk) / 100;
  const qty = price > 0 ? targetSize / price : 0;
  const newPortfolioValue = totalValue + targetSize;
  const newAlloc = newPortfolioValue > 0 ? (targetSize / newPortfolioValue) * 100 : 0;
  return (
    <Modal onClose={onClose}>
      <div className="flex items-center justify-between mb-4">
        <h3 className="text-lg sm:text-xl font-bold font-display">🧮 Position Sizing Calculator</h3>

      </div>
      <p className="text-xs text-slate-400 mb-4">Berechne wie viel du in eine neue Position investieren solltest, basierend auf Risiko-Prozent.</p>
      <div className="space-y-3">
        <Field label="Verfügbares Kapital USD"><input type="number" value={available} onChange={(e) => setAvailable(e.target.value)} placeholder="1000" className="w-full px-3 py-2 bg-slate-950 border border-cyan-900 rounded text-sm focus:outline-none focus:border-cyan-500" /></Field>
        <Field label="Risiko / Anteil %"><input type="number" value={riskPct} onChange={(e) => setRiskPct(e.target.value)} className="w-full px-3 py-2 bg-slate-950 border border-cyan-900 rounded text-sm focus:outline-none focus:border-cyan-500" /><p className="text-[10px] text-cyan-700 mt-1">💡 5% = konservativ · 10% = ausgewogen · 20%+ = aggressiv</p></Field>
        <Field label="Coin (optional)"><input type="text" value={coin} onChange={(e) => setCoin(e.target.value)} placeholder="z.B. TAO" className="w-full px-3 py-2 bg-slate-950 border border-cyan-900 rounded text-sm focus:outline-none focus:border-cyan-500" /></Field>
        <Field label="Aktueller Preis USD (optional)"><input type="number" step="any" value={coinPrice} onChange={(e) => setCoinPrice(e.target.value)} placeholder="0.00" className="w-full px-3 py-2 bg-slate-950 border border-cyan-900 rounded text-sm focus:outline-none focus:border-cyan-500" /></Field>
      </div>
      {avail > 0 && (
        <div className="mt-4 p-3 border border-cyan-900 rounded bg-cyan-950/20 space-y-2">
          <div className="flex justify-between text-sm"><span className="text-cyan-700">Investiere:</span><span className="font-bold tabular-nums">${fmt(targetSize, 2)}</span></div>
          {qty > 0 && <div className="flex justify-between text-sm"><span className="text-cyan-700">Menge {coin || "Coin"}:</span><span className="font-bold tabular-nums">{fmt(qty, 4)}</span></div>}
          {totalValue > 0 && <div className="flex justify-between text-sm"><span className="text-cyan-700">Neue Allokation:</span><span className="font-bold tabular-nums">{newAlloc.toFixed(1)}%</span></div>}
        </div>
      )}
      <button onClick={onClose} className="mt-4 w-full py-2 text-sm border border-cyan-900 hover:bg-cyan-950/40 rounded text-cyan-300">Schließen</button>
    </Modal>
  );
}

function PortfolioManagerModal({ portfolios, activeId, onSelect, onUpdate, onClose }) {
  const [newName, setNewName] = useState("");
  const handleAdd = () => {
    if (!newName.trim()) return;
    onUpdate([...portfolios, { id: Date.now().toString(), name: newName.trim(), positions: [], watchlist: [] }]);
    setNewName("");
  };
  const handleDelete = (id) => {
    if (portfolios.length <= 1) { alert("Mindestens ein Portfolio muss bleiben."); return; }
    onUpdate(portfolios.filter(p => p.id !== id));
    if (activeId === id) onSelect(portfolios.find(p => p.id !== id).id);
  };
  return (
    <Modal onClose={onClose}>
      <div className="flex items-center justify-between mb-4">
        <h3 className="text-lg sm:text-xl font-bold font-display">💼 Portfolios verwalten</h3>
        <button onClick={onClose} className="p-1 hover:bg-cyan-950/40 rounded text-cyan-400"><Icon name="x" size={16} /></button>
      </div>
      <div className="space-y-2 mb-4">
        {portfolios.map(p => (
          <div key={p.id} className={`flex items-center gap-2 p-3 border rounded ${activeId === p.id ? "border-cyan-500 bg-cyan-950/30" : "border-cyan-900/40 bg-slate-900/40"}`}>
            <button onClick={() => onSelect(p.id)} className="flex-1 text-left">
              <div className="font-bold text-sm">{p.name} {activeId === p.id && <span className="text-cyan-400 text-xs">✓ aktiv</span>}</div>
              <div className="text-xs text-slate-400">{p.positions.length} Positionen · {(p.watchlist || []).length} Watchlist</div>
            </button>
            <button onClick={() => handleDelete(p.id)} className="p-1 hover:bg-red-950/40 rounded text-red-400"><Icon name="trash-2" size={14} /></button>
          </div>
        ))}
      </div>
      <div className="flex gap-2">
        <input value={newName} onChange={(e) => setNewName(e.target.value)} placeholder="Neues Portfolio Name" className="flex-1 px-3 py-2 bg-slate-950 border border-cyan-900 rounded text-sm focus:outline-none focus:border-cyan-500" />
        <button onClick={handleAdd} className="px-4 py-2 text-sm font-bold bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-950 rounded flex items-center gap-1"><Icon name="folder-plus" size={14} /> Neu</button>
      </div>
    </Modal>
  );
}

  });

  const presets = [
    { id: "current", name: "Heute", scenarios: { spot: 100, trading: 100, dca: 100, memecoin: 100, ai: 100, defi: 100, infra: 100, l1: 100, rwa: 100, other: 100 } },
    { id: "modest", name: "Bescheidene Erholung", scenarios: { spot: 200, trading: 200, dca: 200, memecoin: 250, ai: 250, defi: 200, infra: 200, l1: 250, rwa: 180, other: 150 } },
    { id: "bullrun", name: "Vollständiger Bullrun", scenarios: { spot: 400, trading: 400, dca: 400, memecoin: 800, ai: 600, defi: 500, infra: 500, l1: 500, rwa: 350, other: 300 } },
    { id: "altseason", name: "Mega Altseason", scenarios: { spot: 500, trading: 500, dca: 500, memecoin: 1500, ai: 1000, defi: 800, infra: 800, l1: 800, rwa: 500, other: 400 } },
  ];

  const simulated = useMemo(() => {
    return positions.map(p => {
      const multiplier = (scenarios[p.category] || 100) / 100;
      const newPrice = p.currentPrice * multiplier;
      const newValue = p.qty * newPrice;
      const newPL = newValue - p.cost;
      const newPLPct = p.cost > 0 ? (newPL / p.cost) * 100 : 0;
      return { ...p, simPrice: newPrice, simValue: newValue, simPL: newPL, simPLPct: newPLPct };
    });
  }, [positions, scenarios]);

  const totalCurrentValue = positions.reduce((s, p) => s + p.value, 0);
  const totalCurrentCost = positions.reduce((s, p) => s + p.cost, 0);
  const totalSimValue = simulated.reduce((s, p) => s + p.simValue, 0);
  const totalSimPL = totalSimValue - totalCurrentCost;
  const totalSimPLPct = totalCurrentCost > 0 ? (totalSimPL / totalCurrentCost) * 100 : 0;
  const valueIncrease = totalCurrentValue > 0 ? ((totalSimValue / totalCurrentValue) - 1) * 100 : 0;

  const breakEvenCount = simulated.filter(p => p.simPL >= 0).length;

  return (
    <Modal onClose={onClose} size="large">
      <div className="flex items-center justify-between mb-4">
        <div>
          <h3 className="text-lg sm:text-xl font-bold font-display">🚀 Bullrun-Simulator</h3>
          <p className="text-xs text-cyan-700 mt-1">Spiel mit Markt-Szenarien und sieh wie dein Portfolio reagiert</p>
        </div>
        <button onClick={onClose} className="p-1 hover:bg-cyan-950/40 rounded text-cyan-400"><Icon name="x" size={16} /></button>
      </div>

      {/* Preset buttons */}
      <div className="flex flex-wrap gap-2 mb-4">
        {presets.map(p => (
          <button key={p.id} onClick={() => setScenarios(p.scenarios)} className="px-3 py-1.5 text-xs border border-cyan-900 hover:border-cyan-500 hover:bg-cyan-950/40 rounded text-cyan-300">{p.name}</button>
        ))}
      </div>

      {/* Result KPIs */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-4">
        <div className="border border-cyan-900/40 rounded p-3 bg-slate-900/40">
          <div className="text-[9px] text-cyan-700 font-bold tracking-widest">SIM. WERT</div>
          <div className="text-lg sm:text-2xl font-bold tabular-nums text-cyan-100 font-display">${fmt(totalSimValue, 0)}</div>
          <div className={`text-[10px] tabular-nums ${valueIncrease >= 0 ? "text-emerald-400" : "text-red-400"}`}>{fmtPct(valueIncrease)} vs. heute</div>
        </div>
        <div className="border border-cyan-900/40 rounded p-3 bg-slate-900/40">
          <div className="text-[9px] text-cyan-700 font-bold tracking-widest">SIM. P/L</div>
          <div className={`text-lg sm:text-2xl font-bold tabular-nums font-display ${totalSimPL >= 0 ? "text-emerald-400" : "text-red-400"}`}>${fmt(totalSimPL, 0)}</div>
          <div className={`text-[10px] tabular-nums ${totalSimPLPct >= 0 ? "text-emerald-400" : "text-red-400"}`}>{fmtPct(totalSimPLPct)}</div>
        </div>
        <div className="border border-emerald-900/40 rounded p-3 bg-emerald-950/20">
          <div className="text-[9px] text-emerald-400 font-bold tracking-widest">IM PLUS</div>
          <div className="text-lg sm:text-2xl font-bold tabular-nums text-emerald-400 font-display">{breakEvenCount}/{positions.length}</div>
          <div className="text-[10px] text-emerald-300">Positionen profitabel</div>
        </div>
        <div className="border border-cyan-900/40 rounded p-3 bg-slate-900/40">
          <div className="text-[9px] text-cyan-700 font-bold tracking-widest">VS. INVESTIERT</div>
          <div className={`text-lg sm:text-2xl font-bold tabular-nums font-display ${totalSimPLPct >= 0 ? "text-emerald-400" : "text-red-400"}`}>{(totalSimValue/totalCurrentCost).toFixed(2)}x</div>
          <div className="text-[10px] text-cyan-700">deines Investments</div>
        </div>
      </div>

      {/* Sliders */}
      <h4 className="text-[10px] font-bold tracking-widest text-cyan-400 mb-3">SEKTOR-MULTIPLIKATOREN</h4>
      <div className="space-y-3 max-h-[35vh] overflow-y-auto pr-2">
        {CATEGORIES.map(c => {
          const count = positions.filter(p => p.category === c.id).length;
          if (count === 0) return null;
          return (
            <div key={c.id}>
              <div className="flex items-center justify-between text-xs mb-1">
                <div className="flex items-center gap-2">
                  <div className="w-2 h-2 rounded-sm" style={{ background: c.color }} />
                  <span className="text-slate-300 font-bold">{c.label}</span>
                  <span className="text-slate-500 text-[10px]">({count})</span>
                </div>
                <span className="font-bold tabular-nums text-cyan-300">{(scenarios[c.id] / 100).toFixed(1)}x</span>
              </div>
              <input type="range" min="0" max="2000" step="10" value={scenarios[c.id]} onChange={(e) => setScenarios(prev => ({ ...prev, [c.id]: parseInt(e.target.value) }))} className="w-full accent-cyan-500" />
              <div className="flex justify-between text-[9px] text-slate-600">
                <span>0x</span><span>5x</span><span>10x</span><span>20x</span>
              </div>
            </div>
          );
        })}
      </div>

      {/* Position breakdown */}
      <details className="mt-4">
        <summary className="cursor-pointer text-xs text-cyan-400 hover:text-cyan-300 font-bold">▾ Positionen im Detail anzeigen</summary>
        <div className="mt-2 space-y-1 max-h-[30vh] overflow-y-auto">
          {[...simulated].sort((a, b) => b.simValue - a.simValue).map(p => (
            <div key={p.id} className="flex items-center gap-2 text-xs px-2 py-1.5 border border-slate-800 rounded bg-slate-900/40">
              <span className="font-bold w-16 sm:w-20">{p.symbol}</span>
              <span className="flex-1 text-slate-400 hidden sm:block">{fmtPrice(p.currentPrice)} → {fmtPrice(p.simPrice)}</span>
              <span className="font-bold tabular-nums w-20 text-right">${fmt(p.simValue, 0)}</span>
              <span className={`font-bold tabular-nums w-16 sm:w-20 text-right ${p.simPLPct >= 0 ? "text-emerald-400" : "text-red-400"}`}>{fmtPct(p.simPLPct)}</span>
            </div>
          ))}
        </div>
      </details>

      <div className="mt-4 p-3 border border-amber-900/40 bg-amber-950/20 rounded text-xs text-amber-200">
        <strong>💡 Hinweis:</strong> Dies ist ein Was-wäre-wenn-Szenario zur Veranschaulichung. Reale Bewegungen können stark abweichen. Keine Vorhersage, keine Garantie.
      </div>

      <button onClick={onClose} className="mt-4 w-full py-2 text-sm border border-cyan-900 hover:bg-cyan-950/40 rounded text-cyan-300">Schließen</button>
    </Modal>
  );
}

        <h3 className="text-xl font-bold font-display">📖 Anleitung</h3>

        <section>
          <h4 className="font-bold text-cyan-400 mb-2">💾 Datensicherheit — sehr wichtig!</h4>

          <p className="text-slate-300">Erstelle separate Portfolios für verschiedene Strategien (Spot, Trading, DCA, Memecoins). Klick auf den Portfolio-Namen oben links zum Wechseln/Verwalten.</p>
        </section>
        <section>
          <h4 className="font-bold text-cyan-400 mb-2">🔒 Datenschutz</h4>
          <p className="text-slate-300">Atlantis Terminal sendet <strong>nichts</strong> an Server. Alles läuft komplett in deinem Browser. Niemand außer dir hat Zugriff auf deine Daten — auch nicht der Entwickler des Tools.</p>
        </section>

      <button onClick={onClose} className="mt-6 w-full py-2 text-sm font-bold bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-950 rounded">Verstanden</button>
    </Modal>
  );
}

function SettingsModal({ settings, onSave, onCancel }) {
  const [s, setS] = useState(settings);
  return (
    <Modal onClose={onCancel}>
      <div className="flex items-center justify-between mb-4">
        <h3 className="text-xl font-bold font-display">⚙️ Einstellungen</h3>
        <button onClick={onCancel} className="p-1 hover:bg-cyan-950/40 rounded text-cyan-400"><Icon name="x" size={16} /></button>
      </div>
      <div className="space-y-4">
        <Field label="Land (für Steuer-Report)">
          <select value={s.country} onChange={(e) => setS(prev => ({ ...prev, country: e.target.value }))} className="w-full px-3 py-2 bg-slate-950 border border-cyan-900 rounded text-sm focus:outline-none focus:border-cyan-500">
            {Object.values(COUNTRIES).map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </Field>
        <Field label="Standard-Strategie für neue Positionen">
          <select value={s.defaultStrategy} onChange={(e) => setS(prev => ({ ...prev, defaultStrategy: e.target.value }))} className="w-full px-3 py-2 bg-slate-950 border border-cyan-900 rounded text-sm focus:outline-none focus:border-cyan-500">
            {Object.values(STRATEGIES).map(st => <option key={st.id} value={st.id}>{st.name} — {st.description}</option>)}
          </select>
        </Field>
      </div>
      <div className="flex gap-2 mt-5">
        <button onClick={onCancel} className="flex-1 py-2 text-sm border border-cyan-900 hover:bg-cyan-950/40 rounded text-cyan-300">Abbrechen</button>
        <button onClick={() => onSave(s)} className="flex-1 py-2 text-sm font-bold bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-950 rounded">Speichern</button>
      </div>
    </Modal>
  );
}

function CMCExportModal({ text, onClose }) {
  const [copied, setCopied] = useState(false);
  const handleCopy = () => {
    navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };
  return (
    <Modal onClose={onClose}>
      <div className="flex items-center justify-between mb-4">
        <h3 className="text-xl font-bold font-display">🔔 CMC Alert-Liste</h3>
        <button onClick={onClose} className="p-1 hover:bg-cyan-950/40 rounded text-cyan-400"><Icon name="x" size={16} /></button>
      </div>
      <p className="text-xs text-slate-400 mb-3">Kopiere die Liste und trag die Levels in CoinMarketCap als Preis-Alerts ein. So bekommst du Push-Notifications direkt aufs Handy.</p>
      <pre className="text-[10px] sm:text-xs bg-slate-950 border border-cyan-900 rounded p-3 overflow-x-auto max-h-80 text-cyan-100 font-mono whitespace-pre">{text}</pre>
      <div className="flex gap-2 mt-4">
        <button onClick={onClose} className="flex-1 py-2 text-sm border border-cyan-900 hover:bg-cyan-950/40 rounded text-cyan-300">Schließen</button>
        <button onClick={handleCopy} className="flex-1 py-2 text-sm font-bold bg-gradient-to-r from-cyan-400 to-blue-500 text-slate-950 rounded flex items-center justify-center gap-1.5">{copied ? <><Icon name="check" size={14} /> Kopiert!</> : <><Icon name="copy" size={14} /> In Zwischenablage</>}</button>
      </div>
    </Modal>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
